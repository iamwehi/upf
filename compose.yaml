# The whole UPF stack in containers — the one way to run it (Linux and macOS).
# FoundationDB, the three roles, the load generator, and a dev/test service, all
# coordinating only through FDB. Driven by the Justfile:
#
#   just build            # build the images
#   just up [procs]       # FDB + writer + pusher + janitor  (procs=1 memory by default)
#   just up 4 ssd         # multi-process ssd FDB for benching
#   just bench topics=... # run loadgen (container) against the roles
#   just test             # cargo test in the dev container against FDB
#   just down             # stop + wipe
#
# UPF speaks ntfy: publish to the writer (http://localhost:8080/{topic}?up=1),
# subscribe on the pusher (ws://localhost:8081/{topic}/ws). Inside the network the
# roles are writer:8080 and pusher:8080 (the 8081 is only the host-published port).

name: upf

# Shared config for the three role containers: one image, one cluster file, one
# shard count (the writer->pusher poke needs an identical K on both sides).
x-upf-role: &upf-role
  image: upf:local
  build:
    context: .
    dockerfile: Containerfile
  depends_on:
    fdb-init:
      condition: service_completed_successfully
  volumes:
    - fdb:/var/fdb
  environment: &upf-env
    FDB_CLUSTER_FILE: /var/fdb/fdb.cluster
    UPF_SHARD_COUNT: "64"
    RUST_LOG: upf=info
  restart: unless-stopped

services:
  # ---- FoundationDB (FDB_PROCS processes on FDB_ENGINE) --------------------
  fdb:
    build:
      context: .
      dockerfile: Containerfile.fdb
    image: upf-fdb:local
    volumes:
      - fdb:/var/fdb
    environment:
      FDB_PROCS: ${FDB_PROCS:-1}
    restart: unless-stopped

  # One-shot: create + size the database; the gate the roles wait on.
  fdb-init:
    image: upf-fdb:local
    depends_on:
      - fdb
    volumes:
      - fdb:/var/fdb
    environment:
      FDB_PROCS: ${FDB_PROCS:-1}
      FDB_ENGINE: ${FDB_ENGINE:-memory}
    entrypoint: ["/usr/local/bin/fdb-init.sh"]
    restart: "no"

  # ---- the three roles (one image, three configs) -------------------------
  writer:
    <<: *upf-role
    environment:
      <<: *upf-env
      UPF_ROLES: writer
    ports:
      - "8080:8080" # app servers publish here (POST /{topic}?up=1)

  pusher:
    <<: *upf-role
    environment:
      <<: *upf-env
      UPF_ROLES: pusher
      UPF_NODE_ID: pusher-1 # stable identity: affinity/bell ownership survives restarts
    ports:
      - "8081:8080" # distributors subscribe here (/{topic}/ws)

  janitor:
    <<: *upf-role
    environment:
      <<: *upf-env
      UPF_ROLES: janitor

  # ---- load generator (bench profile) -------------------------------------
  # Runs the loadgen binary baked into the upf image, against the roles by
  # service name. `just bench ARGS` overrides the command with key=value args.
  # Not started by `just up` (which lists services explicitly); run on demand
  # via `just bench`. Profiles are avoided for podman-compose compatibility.
  loadgen:
    image: upf:local
    depends_on:
      - writer
      - pusher
    entrypoint: ["/usr/local/bin/loadgen"]
    command:
      - http_base=http://writer:8080
      - ws_base=ws://pusher:8080

  # ---- dev / test ---------------------------------------------------------
  # A build container with cargo + libfdb_c and the source mounted, joined to the
  # network so `cargo test` reaches FDB. `just test` runs `cargo test` here (bring
  # the stack up first with `just up`). Not started by `just up`.
  dev:
    build:
      context: .
      dockerfile: Containerfile.dev
    volumes:
      - .:/work:Z
      - fdb:/var/fdb
      - cargo-home:/work/.cargo-home
    working_dir: /work
    environment:
      FDB_CLUSTER_FILE: /var/fdb/fdb.cluster
      CARGO_HOME: /work/.cargo-home
      RUST_LOG: upf=info
    command: ["cargo", "test"]

volumes:
  fdb:
  cargo-home:
