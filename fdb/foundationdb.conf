# Base FoundationDB config for a native Linux bench host — the packaged layout
# (runs as the `foundationdb` user, data under /var/lib/foundationdb), which is
# the known-good template. `just fdb-bench N` copies this and appends N-1 extra
# `[fdbserver.450X]` sections to run a multi-process cluster; `just fdb-single`
# uses it as-is for a single-process correctness loop.
#
# `$ID` is expanded by fdbmonitor to each section's port, giving every process
# its own data dir and public address.

[fdbmonitor]
user = foundationdb
group = foundationdb

[general]
restart-delay = 60
cluster-file = /etc/foundationdb/fdb.cluster

[fdbserver]
command = /usr/sbin/fdbserver
public-address = auto:$ID
listen-address = public
datadir = /var/lib/foundationdb/data/$ID
logdir = /var/log/foundationdb
storage-memory = 1GiB

[fdbserver.4500]
